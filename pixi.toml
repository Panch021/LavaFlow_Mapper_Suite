[project]
name = "lavaflow_mapper_suite"
version = "2.0.0"
description = "Suite for monitoring lava flow propagation using VIIRS and MODIS thermal anomalies"
authors = ["Francisco J. Vasconez <fjvasconez@igepn.edu.ec>"]
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "win-64"]

[dependencies]
python = "3.11.4"

# --- Web app framework ---
dash = ">=2.11.0"
dash-leaflet = ">=0.1.21"
 
# --- Data manipulation ---
pandas = ">=2.0.0"
numpy = ">=1.24.0"
 
# --- HTTP client (FIRMS API downloads) ---
requests = ">=2.31.0"
 
# --- Interactive plotting ---
plotly = ">=5.15.0"
 
# --- Static interactive maps (folium/branca) ---
folium = ">=0.14.0"
branca = ">=0.6.0"
 
# --- Geospatial shapefile support ---
geopandas = ">=0.13.0"
shapely = ">=2.0.1"
pyproj = ">=3.5.0"
 
[tasks]
start = "python lavaflow_mapper_suite.py"
